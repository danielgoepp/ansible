---
# Manifest apply-only tasks for operator-managed resources (CRDs, etc.)
# Applies the manifest and lets the operator handle pod lifecycle.
# Does not check for apps/v1 Deployment/StatefulSet status.

- name: Set context suffix
  set_fact:
    context_suffix: "{{ context_suffix | default('prod') }}"

- name: Set computed paths
  set_fact:
    field_manager: "ansible-{{ service_name }}-upgrade"
    default_manifest_path: "{{ k3s_config_base_path }}/{{ service_name }}/manifests/{{ service_name }}-{{ context_suffix }}.yaml"

- name: Apply manifest from local file (server-side)
  kubernetes.core.k8s:
    state: present
    src: "{{ manifest_path | default(default_manifest_path) }}"
    context: "{{ k8s_context }}"
    server_side_apply:
      field_manager: "{{ field_manager }}"
