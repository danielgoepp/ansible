---
# Ceph Health Check with retry-and-prompt-on-failure
# HEALTH_OK or HEALTH_WARN-with-only-noout count as healthy.
# Anything else (scrubbing, cleaning, degraded, etc.) blocks and retries.
# After all retries: pause for operator with continue/retry/abort.
#
# Parameters:
#   ceph_host: PVE host to delegate the check to (default: groups['pve'][0])
#   ceph_health_retries: how many retries before pausing (default: 20)
#   ceph_health_delay: seconds between retries (default: 30)
#   allow_noout: treat HEALTH_WARN with only the noout warning as healthy (default: true)
#   interactive_mode: whether to prompt operator on failure (default: true)

- name: Set ceph health check defaults
  ansible.builtin.set_fact:
    ceph_host: "{{ ceph_host | default(groups['pve'][0]) }}"
    ceph_health_retries: "{{ ceph_health_retries | default(20) }}"
    ceph_health_delay: "{{ ceph_health_delay | default(30) }}"
    allow_noout: "{{ allow_noout | default(true) }}"
    interactive_mode: "{{ interactive_mode | default(hostvars['localhost']['interactive_mode'] | default(true)) }}"

- name: Wait for Ceph to be healthy
  block:
    - name: Run ceph health
      ansible.builtin.command: ceph health
      delegate_to: "{{ ceph_host }}"
      become: true
      register: ceph_health_result
      changed_when: false
      # ceph health exits rc=1 for HEALTH_WARN; failed_when: false lets until
      # evaluate the condition rather than dropping straight to rescue.
      failed_when: false
      # Healthy = HEALTH_OK, or (when noout is allowed) HEALTH_WARN where the
      # only listed condition involves noout (no semicolons => single condition).
      # Any other warning (scrubbing, cleaning, degraded, etc.) blocks until resolved.
      until: >
        (ceph_health_result.stdout | trim) == 'HEALTH_OK' or
        (
          allow_noout | bool and
          (ceph_health_result.stdout | trim) is match('^HEALTH_WARN[^;]*noout[^;]*$')
        )
      retries: "{{ ceph_health_retries | int }}"
      delay: "{{ ceph_health_delay | int }}"

  rescue:
    - name: Display ceph health failure
      ansible.builtin.debug:
        msg: "{{ _msg.split('\n') }}"
      vars:
        _msg: |
          ========================================
          CEPH HEALTH CHECK FAILED
          ========================================
          Ceph is not healthy after {{ ceph_health_retries }} retries
          (every {{ ceph_health_delay }}s).

          Last output:
          {{ ceph_health_result.stdout | default('(no output)') }}

          Please investigate and resolve the issue, then choose how to proceed.

    - name: Operator decision on ceph failure
      ansible.builtin.pause:
        prompt: |

          [c]ontinue (treat as healthy and proceed),
          [r]etry  (re-run the ceph health check), or
          [a]bort  (fail the playbook)?
      register: ceph_operator_decision
      when: interactive_mode | bool

    - name: Abort if operator chose abort
      ansible.builtin.fail:
        msg: "Operator aborted: ceph remained unhealthy"
      when:
        - interactive_mode | bool
        - ceph_operator_decision.user_input | lower in ['a', 'abort']

    - name: Recurse into ceph health check on operator retry
      ansible.builtin.include_tasks: ops-upgrade-cluster-ceph-health.yaml
      when:
        - interactive_mode | bool
        - ceph_operator_decision.user_input | lower in ['r', 'retry']

    - name: Fail if non-interactive and unhealthy
      ansible.builtin.fail:
        msg: "Ceph remained unhealthy and interactive_mode=false"
      when: not (interactive_mode | bool)

- name: Display final ceph health
  ansible.builtin.debug:
    msg: "Ceph: {{ ceph_health_result.stdout | default('unknown') | trim }}"
