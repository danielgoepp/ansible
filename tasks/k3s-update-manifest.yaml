---
# Generic manifest upgrade tasks
# Requires service_name to be set by the calling playbook

- name: Set default variables
  set_fact:
    context_suffix: "{{ context_suffix | default('prod') }}"
    field_manager: "ansible-{{ service_name }}-upgrade"

- name: Set computed paths
  set_fact:
    default_manifest_path: "{{ k3s_config_base_path }}/{{ service_name }}/manifests/{{ service_name }}-{{ context_suffix }}.yaml"

- name: Apply manifest from local file (server-side)
  kubernetes.core.k8s:
    state: present
    src: "{{ manifest_path | default(default_manifest_path) }}"
    context: "{{ k8s_context }}"
    server_side_apply:
      field_manager: "{{ field_manager }}"
  register: apply_result

- name: Get current pods to check if restart is needed
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ service_namespace }}"
    label_selectors:
      - "app={{ app_label }}"
    context: "{{ k8s_context }}"
  register: current_pods

- name: Force pod restart if manifest didn't trigger restart
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: "{{ pod_item.metadata.name }}"
    namespace: "{{ service_namespace }}"
    context: "{{ k8s_context }}"
  loop: "{{ current_pods.resources }}"
  loop_control:
    loop_var: pod_item
    label: "{{ pod_item.metadata.name }}"
  when:
    - current_pods.resources | length > 0
    - not apply_result.changed
    - pod_item.metadata.deletionTimestamp is not defined
  no_log: true

- name: Wait for deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: "{{ deployment_name }}"
    namespace: "{{ service_namespace }}"
    context: "{{ k8s_context }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
