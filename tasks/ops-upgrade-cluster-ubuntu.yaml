---
# Ubuntu apt dist-upgrade on a k3s VM
# Runs apt update + dist-upgrade with the same flags as the planning notes:
#   apt update && DEBIAN_FRONTEND=noninteractive apt-get -q -y \
#     -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" dist-upgrade
#
# Does NOT reboot - the VM is shut down by the next step.
#
# Parameters:
#   k3s_node: hostname of the k3s VM to upgrade

- name: Display Ubuntu upgrade target
  ansible.builtin.debug:
    msg: "=== apt dist-upgrade on {{ k3s_node }} ==="

- name: apt update on {{ k3s_node }}
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  delegate_to: "{{ k3s_node }}"
  become: true

- name: List upgradable packages on {{ k3s_node }}
  ansible.builtin.shell:
    cmd: apt list --upgradable 2>/dev/null | grep -v '^Listing' | wc -l
  delegate_to: "{{ k3s_node }}"
  become: true
  register: ubuntu_upgradable
  changed_when: false

- name: Display upgradable count
  ansible.builtin.debug:
    msg: "{{ ubuntu_upgradable.stdout }} packages available for upgrade on {{ k3s_node }}"

- name: apt dist-upgrade on {{ k3s_node }}
  ansible.builtin.apt:
    upgrade: dist
    autoclean: true
    autoremove: true
    dpkg_options: force-confdef,force-confold
  environment:
    DEBIAN_FRONTEND: noninteractive
  delegate_to: "{{ k3s_node }}"
  become: true
  register: ubuntu_upgrade_result
  when: ubuntu_upgradable.stdout | int > 0

- name: Display Ubuntu upgrade result
  ansible.builtin.debug:
    var: ubuntu_upgrade_result.stdout_lines
  when: ubuntu_upgrade_result is not skipped

- name: Ubuntu upgrade complete
  ansible.builtin.debug:
    msg: "=== Ubuntu upgrade on {{ k3s_node }} complete ==="
