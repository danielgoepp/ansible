---
# Proxmox Node Upgrade Operations
# apt update && dist-upgrade, reboot, wait for services and Ceph to settle.
# noout is set globally before this runs, so HEALTH_WARN-noout is treated as healthy.
#
# Parameters:
#   pve_node: target Proxmox node (delegate_to)
#   wait_timeout: timeout for reboot wait (default: 600)
#   reboot_wait: post-reboot delay (default: 60)

- name: Set Proxmox upgrade defaults
  ansible.builtin.set_fact:
    wait_timeout: "{{ wait_timeout | default(600) }}"
    reboot_wait: "{{ reboot_wait | default(60) }}"

- name: Display Proxmox upgrade target
  ansible.builtin.debug:
    msg: "=== Upgrade Proxmox node {{ pve_node }} ==="

- name: apt update on {{ pve_node }}
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  delegate_to: "{{ pve_node }}"
  become: true

- name: List upgradable packages on {{ pve_node }}
  ansible.builtin.shell:
    cmd: apt list --upgradable 2>/dev/null | grep -v '^Listing' | wc -l
  delegate_to: "{{ pve_node }}"
  become: true
  register: pve_upgradable
  changed_when: false

- name: Display upgradable count
  ansible.builtin.debug:
    msg: "{{ pve_upgradable.stdout }} packages available for upgrade on {{ pve_node }}"

- name: apt dist-upgrade on {{ pve_node }}
  ansible.builtin.apt:
    upgrade: dist
    autoclean: true
    autoremove: true
    dpkg_options: force-confdef,force-confold
  environment:
    DEBIAN_FRONTEND: noninteractive
  delegate_to: "{{ pve_node }}"
  become: true
  register: pve_upgrade_result
  when: pve_upgradable.stdout | int > 0

- name: Display Proxmox upgrade output
  ansible.builtin.debug:
    var: pve_upgrade_result.stdout_lines
  when: pve_upgrade_result is not skipped

- name: Reboot {{ pve_node }}
  ansible.builtin.reboot:
    reboot_timeout: "{{ wait_timeout | int }}"
    post_reboot_delay: "{{ reboot_wait | int }}"
    msg: "Rebooting after Proxmox upgrade"
  delegate_to: "{{ pve_node }}"
  become: true

- name: Wait for {{ pve_node }} to be reachable
  ansible.builtin.wait_for_connection:
    connect_timeout: 10
    delay: 30
    sleep: 10
    timeout: "{{ wait_timeout | int }}"
  delegate_to: "{{ pve_node }}"

- name: Verify Proxmox services are running on {{ pve_node }}
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  delegate_to: "{{ pve_node }}"
  become: true
  loop:
    - pveproxy
    - pvedaemon
    - pvestatd

- name: Check pvecm status from {{ pve_node }}
  ansible.builtin.command: pvecm status
  delegate_to: "{{ pve_node }}"
  become: true
  register: pvecm_after
  changed_when: false
  failed_when: false

- name: Display pvecm status
  ansible.builtin.debug:
    var: pvecm_after.stdout_lines
  when: pvecm_after.rc == 0

- name: Wait for Ceph to settle (noout allowed)
  ansible.builtin.include_tasks: ops-upgrade-cluster-ceph-health.yaml
  vars:
    ceph_host: "{{ pve_node }}"
    allow_noout: true
    ceph_health_retries: 60
    ceph_health_delay: 30

- name: Proxmox upgrade complete
  ansible.builtin.debug:
    msg: "=== Proxmox node {{ pve_node }} upgrade complete ==="
