---
# Apply a manifest then perform an explicit rollout restart.
# Used for resources (e.g. StatefulSets with OnDelete strategy) where applying
# a new image tag alone does not trigger a rolling update.

- name: Set manifest rollout-restart variables
  set_fact:
    mrr_context: "{{ k8s_context | default(k3s_default_context) }}"
    mrr_resource_type: "{{ resource_type | default('statefulset') }}"
    mrr_resource_name: "{{ resource_name | default(service_name) }}"
    mrr_namespace: "{{ service_namespace | default(service_name) }}"
    mrr_field_manager: "ansible-{{ service_name }}-upgrade"
    _kind_map:
      statefulset: StatefulSet
      deployment: Deployment
      daemonset: DaemonSet

- name: Set Kubernetes kind
  set_fact:
    mrr_kind: "{{ _kind_map[mrr_resource_type] }}"

- name: Apply manifest from local file (server-side)
  kubernetes.core.k8s:
    state: present
    src: "{{ manifest_path }}"
    context: "{{ mrr_context }}"
    server_side_apply:
      field_manager: "{{ mrr_field_manager }}"

- name: Perform rollout restart
  kubernetes.core.k8s_json_patch:
    api_version: apps/v1
    kind: "{{ mrr_kind }}"
    name: "{{ mrr_resource_name }}"
    namespace: "{{ mrr_namespace }}"
    context: "{{ mrr_context }}"
    patch:
      - op: add
        path: /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        value: "{{ now(utc=True, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: Wait for Deployment rollout to complete
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: "{{ mrr_kind }}"
    name: "{{ mrr_resource_name }}"
    namespace: "{{ mrr_namespace }}"
    context: "{{ mrr_context }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  when: mrr_resource_type == 'deployment'

- name: Wait for StatefulSet/DaemonSet rollout to complete
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: "{{ mrr_kind }}"
    name: "{{ mrr_resource_name }}"
    namespace: "{{ mrr_namespace }}"
    context: "{{ mrr_context }}"
  register: mrr_rollout_status
  until: >-
    mrr_rollout_status.resources | length > 0 and
    (mrr_rollout_status.resources[0].status.readyReplicas | default(0)) ==
    (mrr_rollout_status.resources[0].status.replicas | default(0)) and
    (mrr_rollout_status.resources[0].status.replicas | default(0)) > 0
  retries: 30
  delay: 10
  when: mrr_resource_type != 'deployment'
