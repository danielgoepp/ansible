---
# Generic multi-instance CNPG cluster upgrade tasks
# Loops through instances and calls k3s-update-manifest-cnpg.yaml for each
#
# Required variables:
#   - service_name: Name of the service (for display)
#   - instances: List of instances with fields:
#       - name: Instance identifier
#       - manifest_path: Path to manifest file
#       - context: Kubernetes context (optional, defaults to k3s_default_context)
#       - cluster_name: CNPG Cluster name (optional, defaults to service_name-prod)
#       - service_namespace: Namespace (optional, defaults to service_name)
#
# Required variables:
#   - target_instance: Specific instance to upgrade

- name: Validate target_instance is provided
  fail:
    msg: "target_instance is required. Use -e target_instance=<instance>. Available instances: {{ instances | map(attribute='name') | list | join(', ') }}"
  when: target_instance is not defined or target_instance == ''

- name: Set filtered instances based on target selection
  set_fact:
    filtered_instances: "{{ instances | selectattr('name', 'equalto', target_instance) | list }}"

- name: Validate target instance exists
  fail:
    msg: "Instance '{{ target_instance }}' not found. Available instances: {{ instances | map(attribute='name') | list | join(', ') }}"
  when: filtered_instances | length == 0

- name: Display upgrade parameters
  debug:
    msg:
      - "{{ service_name | title }} CNPG Multi-Instance Upgrade Parameters:"
      - "  Target: {{ target_instance }}"
      - "  Instances: {{ filtered_instances | map(attribute='name') | list | join(', ') }}"
      - "  Total: {{ filtered_instances | length }}"

- name: Upgrade {{ service_name | title }} CNPG instances
  include_tasks: k3s-update-manifest-cnpg.yaml
  vars:
    k8s_context: "{{ item.context | default(k3s_default_context) }}"
    manifest_path: "{{ item.manifest_path }}"
    cluster_name: "{{ item.cluster_name | default(service_name + '-prod') }}"
    service_namespace: "{{ item.service_namespace | default(service_name) }}"
  loop: "{{ filtered_instances }}"
  loop_control:
    label: "{{ item.name }}"
