---
# VM/LXC Operations for Cluster Upgrades (community.proxmox)
# Handles VM/LXC migrations, shutdown, and startup using the community.proxmox
# collection per the planning notes.
#
# Parameters:
#   vm_action: "migrate-away" | "migrate-back" | "shutdown" | "startup"
#
#   For migrate-away / migrate-back:
#     pve_node:       source PVE node name (and the home of the VMs)
#     vm_migrations:  list of {vm_id, vm_name, target_node}
#
#   For shutdown / startup:
#     vm_shutdowns:   list of {vm_id, vm_name, vm_type=qemu|lxc, host_node}
#       host_node is the PVE host the VM/LXC normally lives on (used for the
#       shutdown/startup API call). Defaults to the first pve in inventory.
#
# Notes:
#   - api_user/api_token from vault (with awx_* override)
#   - api_host targets the cluster member where the VM lives (or the shared
#     pve15 endpoint for shutdown/startup ops)

- name: Set Proxmox API credentials
  ansible.builtin.set_fact:
    proxmox_api_token_id: "{{ awx_proxmox_api_token_id | default(vault_proxmox_api_token_id | default('')) }}"
    proxmox_api_token_secret: "{{ awx_proxmox_api_token_secret | default(vault_proxmox_api_token_secret | default('')) }}"

- name: Display VM action
  ansible.builtin.debug:
    msg: "=== VM {{ vm_action | upper }} for {{ pve_node | default('shared') }} ==="

# MIGRATE VMs AWAY
- name: Migrate VMs away from {{ pve_node | default('') }}
  when: vm_action == 'migrate-away'
  block:
    - name: Online-migrate VM to target node
      community.proxmox.proxmox_kvm:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ pve_node }}"
        node: "{{ pve_node }}"
        vmid: "{{ item.vm_id }}"
        migrate: true
        target: "{{ item.target_node }}"
        timeout: 600
      loop: "{{ vm_migrations }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) -> {{ item.target_node }}"

    - name: Verify migrated VMs are running on target
      community.proxmox.proxmox_vm_info:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.target_node }}"
        node: "{{ item.target_node }}"
        vmid: "{{ item.vm_id }}"
      register: migrate_away_status
      until: >
        migrate_away_status.proxmox_vms | default([]) | length > 0 and
        migrate_away_status.proxmox_vms[0].status == 'running'
      retries: 30
      delay: 10
      loop: "{{ vm_migrations }}"
      loop_control:
        label: "{{ item.vm_name }} on {{ item.target_node }}"

# MIGRATE VMs BACK
- name: Migrate VMs back to {{ pve_node | default('') }}
  when: vm_action == 'migrate-back'
  block:
    - name: Online-migrate VM back to home node
      community.proxmox.proxmox_kvm:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.target_node }}"
        node: "{{ item.target_node }}"
        vmid: "{{ item.vm_id }}"
        migrate: true
        target: "{{ pve_node }}"
        timeout: 600
      loop: "{{ vm_migrations }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) back to {{ pve_node }}"

    - name: Verify VMs are back on {{ pve_node | default('home node') }}
      community.proxmox.proxmox_vm_info:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ pve_node }}"
        node: "{{ pve_node }}"
        vmid: "{{ item.vm_id }}"
      register: migrate_back_status
      until: >
        migrate_back_status.proxmox_vms | default([]) | length > 0 and
        migrate_back_status.proxmox_vms[0].status == 'running'
      retries: 30
      delay: 10
      loop: "{{ vm_migrations }}"
      loop_control:
        label: "{{ item.vm_name }} on {{ pve_node }}"

# SHUTDOWN VMs / LXCs
- name: Shutdown VMs/LXCs
  when: vm_action == 'shutdown'
  block:
    - name: Shutdown QEMU VMs
      community.proxmox.proxmox_kvm:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
        state: stopped
        timeout: 300
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'qemu') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"

    - name: Shutdown LXC containers
      community.proxmox.proxmox:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
        state: stopped
        timeout: 300
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'lxc') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"

# STARTUP VMs / LXCs
- name: Startup VMs/LXCs
  when: vm_action == 'startup'
  block:
    - name: Start QEMU VMs
      community.proxmox.proxmox_kvm:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
        state: started
        timeout: 300
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'qemu') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"

    - name: Verify QEMU VMs are running
      community.proxmox.proxmox_vm_info:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
      register: qemu_start_status
      until: >
        qemu_start_status.proxmox_vms | default([]) | length > 0 and
        qemu_start_status.proxmox_vms[0].status == 'running'
      retries: 30
      delay: 10
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'qemu') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"

    - name: Start LXC containers
      community.proxmox.proxmox:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
        state: started
        timeout: 300
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'lxc') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"

    - name: Verify LXC containers are running
      community.proxmox.proxmox_vm_info:
        api_user: root@pam
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        api_host: "{{ item.host_node }}"
        node: "{{ item.host_node }}"
        vmid: "{{ item.vm_id }}"
      register: lxc_start_status
      until: >
        lxc_start_status.proxmox_vms | default([]) | length > 0 and
        lxc_start_status.proxmox_vms[0].status == 'running'
      retries: 30
      delay: 10
      loop: "{{ vm_shutdowns | selectattr('vm_type', 'equalto', 'lxc') | list }}"
      loop_control:
        label: "{{ item.vm_name }} ({{ item.vm_id }}) on {{ item.host_node }}"
