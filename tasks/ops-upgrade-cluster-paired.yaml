---
# Paired Proxmox + K3s Node Upgrade
# Per-pair sequence:
#   0a. (pve11 only) Migrate opnsense pve11 -> pve12
#   1.  Drain k3s node
#   2.  Ubuntu apt dist-upgrade on the k3s VM
#   3.  k3s in-place version install (skip-start)
#   4.  Shutdown k3s VM
#   5.  Upgrade Proxmox node + reboot, wait for ceph
#   6.  Start k3s VM
#   7.  Wait for k3s node Ready
#   8.  Uncordon k3s node
#   9.  (pve11 only) Migrate opnsense pve12 -> pve11
#
# Parameters:
#   pve_node: Proxmox host (e.g. pve11)
#   k3s_node: K3s VM hostname (e.g. k3s-prod-11)
#   k3s_target_version: target k3s version (required)
#   opnsense_vm_id (default 101)
#   opnsense_home_node (default pve11)
#   opnsense_failover_node (default pve12)

- name: Set paired upgrade defaults
  ansible.builtin.set_fact:
    interactive_mode: "{{ hostvars['localhost']['interactive_mode'] | default(true) }}"
    verbose_status: "{{ hostvars['localhost']['verbose_status'] | default(true) }}"
    opnsense_vm_id: "{{ opnsense_vm_id | default(101) }}"
    opnsense_home_node: "{{ opnsense_home_node | default('pve11') }}"
    opnsense_failover_node: "{{ opnsense_failover_node | default('pve12') }}"
    is_opnsense_pair: "{{ pve_node == (opnsense_home_node | default('pve11')) }}"

- name: Display paired upgrade banner
  ansible.builtin.debug:
    msg: |
      ===================================================
      PAIRED UPGRADE: {{ pve_node }} + {{ k3s_node }}
      ===================================================
      {% if is_opnsense_pair %}
      0a. Migrate opnsense {{ opnsense_home_node }} -> {{ opnsense_failover_node }}
      {% endif %}
      1. Drain k3s node {{ k3s_node }}
      2. Ubuntu apt dist-upgrade on {{ k3s_node }}
      3. k3s install {{ k3s_target_version }} on {{ k3s_node }}
      4. Shutdown k3s VM {{ k3s_node }}
      5. Upgrade Proxmox node {{ pve_node }} (apt + reboot)
      6. Start k3s VM {{ k3s_node }}
      7. Wait for k3s node Ready
      8. Uncordon k3s node {{ k3s_node }}
      {% if is_opnsense_pair %}
      9. Migrate opnsense {{ opnsense_failover_node }} -> {{ opnsense_home_node }}
      {% endif %}

- name: Pre-pair status snapshot
  block:
    - name: Snapshot - VMs on {{ pve_node }}
      ansible.builtin.shell:
        cmd: |
          echo "=== VMs on {{ pve_node }} ==="
          qm list 2>/dev/null || true
          echo ""
          echo "=== LXCs on {{ pve_node }} ==="
          pct list 2>/dev/null || true
      delegate_to: "{{ pve_node }}"
      become: true
      register: pair_pre_vms
      changed_when: false

    - name: Snapshot - {{ k3s_node }} status
      ansible.builtin.shell:
        cmd: |
          echo "=== Node ==="
          kubectl get node {{ k3s_node }} -o wide
          echo "=== Pod count on {{ k3s_node }} ==="
          kubectl get pods --all-namespaces --field-selector spec.nodeName={{ k3s_node }} --no-headers | wc -l
      delegate_to: localhost
      register: pair_pre_k3s
      changed_when: false

    - name: Display pre-pair status
      ansible.builtin.debug:
        msg: |
          {{ pair_pre_vms.stdout }}
          {{ pair_pre_k3s.stdout }}
      when: verbose_status | bool

- name: Confirm before starting this pair
  ansible.builtin.pause:
    prompt: |

      Ready to upgrade pair {{ pve_node }} + {{ k3s_node }}.
      Continue? (yes/no)
  register: pair_confirm
  when: interactive_mode | bool

- name: Abort if pair not confirmed
  ansible.builtin.fail:
    msg: "Pair upgrade cancelled at {{ pve_node }} + {{ k3s_node }}"
  when:
    - interactive_mode | bool
    - pair_confirm.user_input | lower not in ['yes', 'y']

# STEP 0a: opnsense migration away (only on pve11 pair)
- name: Migrate opnsense to failover before pve11 upgrade
  ansible.builtin.include_tasks: ops-upgrade-cluster-vm.yaml
  vars:
    vm_action: migrate-away
    pve_node: "{{ opnsense_home_node }}"
    vm_migrations:
      - vm_id: "{{ opnsense_vm_id }}"
        vm_name: opnsense
        target_node: "{{ opnsense_failover_node }}"
  when: is_opnsense_pair | bool

# STEP 1: drain
- name: Drain k3s node
  ansible.builtin.include_tasks: ops-upgrade-cluster-k3s.yaml
  vars:
    k3s_action: drain
    k3s_node: "{{ k3s_node }}"

# STEP 2: ubuntu apt dist-upgrade
- name: Ubuntu apt dist-upgrade on {{ k3s_node }}
  ansible.builtin.include_tasks: ops-upgrade-cluster-ubuntu.yaml
  vars:
    k3s_node: "{{ k3s_node }}"

# STEP 3: k3s in-place version install
- name: k3s install {{ k3s_target_version }} on {{ k3s_node }}
  ansible.builtin.include_tasks: ops-upgrade-cluster-k3s-install.yaml
  vars:
    k3s_node: "{{ k3s_node }}"
    k3s_target_version: "{{ k3s_target_version }}"

# STEP 4: shutdown k3s VM (graceful via OS)
- name: Shutdown k3s VM
  ansible.builtin.include_tasks: ops-upgrade-cluster-k3s.yaml
  vars:
    k3s_action: shutdown
    k3s_node: "{{ k3s_node }}"

- name: Confirm before Proxmox upgrade
  ansible.builtin.pause:
    prompt: |

      ========================================
      CRITICAL POINT: PROXMOX UPGRADE
      ========================================
      VM {{ k3s_node }} is offline. Next: apt dist-upgrade + reboot {{ pve_node }}.
      Continue? (yes/no)
  register: pve_confirm
  when: interactive_mode | bool

- name: Abort if Proxmox upgrade not confirmed
  ansible.builtin.fail:
    msg: "Proxmox upgrade cancelled for {{ pve_node }}"
  when:
    - interactive_mode | bool
    - pve_confirm.user_input | lower not in ['yes', 'y']

# STEP 5: Proxmox node upgrade + reboot
- name: Upgrade Proxmox node {{ pve_node }}
  ansible.builtin.include_tasks: ops-upgrade-cluster-proxmox.yaml
  vars:
    pve_node: "{{ pve_node }}"

# STEP 6: start k3s VM
- name: Start k3s VM
  ansible.builtin.include_tasks: ops-upgrade-cluster-k3s.yaml
  vars:
    k3s_action: startup
    k3s_node: "{{ k3s_node }}"

# STEP 7+8: uncordon k3s node (which also waits for pods to be ready)
- name: Uncordon k3s node
  ansible.builtin.include_tasks: ops-upgrade-cluster-k3s.yaml
  vars:
    k3s_action: uncordon
    k3s_node: "{{ k3s_node }}"

# STEP 9: opnsense migration back (only on pve11 pair)
- name: Migrate opnsense back to {{ opnsense_home_node }}
  ansible.builtin.include_tasks: ops-upgrade-cluster-vm.yaml
  vars:
    vm_action: migrate-back
    pve_node: "{{ opnsense_home_node }}"
    vm_migrations:
      - vm_id: "{{ opnsense_vm_id }}"
        vm_name: opnsense
        target_node: "{{ opnsense_failover_node }}"
  when: is_opnsense_pair | bool

- name: Pair completion status
  block:
    - name: Snapshot - final node status
      ansible.builtin.command: kubectl get nodes
      delegate_to: localhost
      register: pair_final_nodes
      changed_when: false

    - name: Display pair completion
      ansible.builtin.debug:
        msg: |
          ===================================================
          PAIR COMPLETE: {{ pve_node }} + {{ k3s_node }}
          ===================================================
          {{ pair_final_nodes.stdout }}

- name: Confirm pair completion
  ansible.builtin.pause:
    prompt: |

      Pair {{ pve_node }} + {{ k3s_node }} done. Status above.
      Continue to next pair? (yes/no)
  register: pair_done_confirm
  when: interactive_mode | bool

- name: Stop if pair not confirmed healthy
  ansible.builtin.fail:
    msg: "Stopping after {{ pve_node }} + {{ k3s_node }} - manual intervention requested"
  when:
    - interactive_mode | bool
    - pair_done_confirm.user_input | lower not in ['yes', 'y']
