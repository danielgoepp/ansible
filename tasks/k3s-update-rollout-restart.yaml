---
# Generic rollout restart tasks
# Used for applications that need a rolling restart (e.g., StatefulSets)
# Requires service_name to be set by the calling playbook

- name: Set rollout restart variables
  set_fact:
    rollout_resource_type: "{{ resource_type | default('statefulset') }}"
    rollout_resource_name: "{{ resource_name | default(service_name) }}"
    rollout_namespace: "{{ service_namespace | default(service_name) }}"
    rollout_context: "{{ k8s_context | default(k3s_default_context) }}"
    _kind_map:
      statefulset: StatefulSet
      deployment: Deployment
      daemonset: DaemonSet

- name: Set Kubernetes kind from resource type
  set_fact:
    rollout_kind: "{{ _kind_map[rollout_resource_type] }}"

- name: Perform rollout restart
  kubernetes.core.k8s_json_patch:
    api_version: apps/v1
    kind: "{{ rollout_kind }}"
    name: "{{ rollout_resource_name }}"
    namespace: "{{ rollout_namespace }}"
    context: "{{ rollout_context }}"
    patch:
      - op: add
        path: /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        value: "{{ now(utc=True, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: Wait for rollout to complete
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: "{{ rollout_kind }}"
    name: "{{ rollout_resource_name }}"
    namespace: "{{ rollout_namespace }}"
    context: "{{ rollout_context }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  when: rollout_resource_type == 'deployment'

- name: Wait for StatefulSet/DaemonSet rollout to complete
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: "{{ rollout_kind }}"
    name: "{{ rollout_resource_name }}"
    namespace: "{{ rollout_namespace }}"
    context: "{{ rollout_context }}"
  register: rollout_status_result
  until: >-
    rollout_status_result.resources | length > 0 and
    (rollout_status_result.resources[0].status.readyReplicas | default(0)) ==
    (rollout_status_result.resources[0].status.replicas | default(0)) and
    (rollout_status_result.resources[0].status.replicas | default(0)) > 0
  retries: 30
  delay: 10
  when: rollout_resource_type != 'deployment'
