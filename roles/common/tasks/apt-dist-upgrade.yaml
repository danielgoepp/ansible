---
# System updates and maintenance
# This should only be run when explicitly requested
#
# Variables:
#   apt_dist_upgrade_reboot: true (default) — set false to skip reboot (e.g. cluster upgrade shuts down VM instead)

- name: Upgrade all packages to latest
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    dpkg_options: 'force-confdef,force-confold'
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Check for packages held back due to phasing
  ansible.builtin.shell:
    cmd: apt list --upgradable 2>/dev/null | grep -v '^Listing' | awk -F'/' '{print $1}'
  register: phased_packages
  changed_when: false

- name: Force upgrade phased packages
  ansible.builtin.apt:
    name: "{{ phased_packages.stdout_lines }}"
    state: latest
    dpkg_options: 'force-confdef,force-confold'
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: phased_packages.stdout_lines | length > 0

- name: Clean apt cache and autoremove
  ansible.builtin.apt:
    autoclean: true
    autoremove: true

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: common_reboot_required_file

- name: Reboot if required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible for kernel updates"
    reboot_timeout: 3600
  when:
    - common_reboot_required_file.stat.exists
    - apt_dist_upgrade_reboot | default(true) | bool
