---
# Portainer Docker container installation and upgrade tasks
# Handles both initial installation and upgrades

- name: Stop existing Portainer container
  ansible.builtin.command: docker stop {{ portainer_container_name }}
  changed_when: false
  failed_when: false

- name: Remove existing Portainer container
  ansible.builtin.command: docker rm {{ portainer_container_name }}
  changed_when: false
  failed_when: false

- name: Pull latest Portainer CE image
  ansible.builtin.command: docker pull {{ portainer_image }}
  register: portainer_pull
  changed_when: "'Status: Downloaded newer image' in portainer_pull.stdout or 'Pulling from' in portainer_pull.stdout"

- name: Start new Portainer container
  ansible.builtin.shell: >
    docker run -d
    --name {{ portainer_container_name }}
    --restart always
    -p {{ portainer_http_port }}:8000
    -p {{ portainer_https_port }}:9443
    -v /var/run/docker.sock:/var/run/docker.sock
    -v {{ portainer_volume }}:/data
    {{ portainer_image }}
  changed_when: true

- name: Wait for Portainer to be ready
  ansible.builtin.uri:
    url: "https://localhost:{{ portainer_https_port }}"
    method: GET
    validate_certs: false
    status_code: [200, 302]
  retries: 30
  delay: 2
  delegate_to: "{{ inventory_hostname }}"

- name: Display Portainer URL
  ansible.builtin.debug:
    msg: "Portainer is ready at https://{{ inventory_hostname }}:{{ portainer_https_port }}"
