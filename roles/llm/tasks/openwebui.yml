---
# Open WebUI Docker container installation and upgrade tasks
# Handles both initial installation and upgrades

- name: Stop existing Open WebUI container
  ansible.builtin.command: docker stop {{ openwebui_container_name }}
  changed_when: false
  failed_when: false

- name: Remove existing Open WebUI container
  ansible.builtin.command: docker rm {{ openwebui_container_name }}
  changed_when: false
  failed_when: false

- name: Pull latest Open WebUI image
  ansible.builtin.command: docker pull {{ openwebui_image }}
  register: openwebui_pull
  changed_when: "'Status: Downloaded newer image' in openwebui_pull.stdout or 'Pulling from' in openwebui_pull.stdout"

- name: Start new Open WebUI container
  ansible.builtin.shell: >
    docker run -d
    --name {{ openwebui_container_name }}
    --restart always
    -p {{ openwebui_port }}:8080
    -e OLLAMA_BASE_URL={{ openwebui_ollama_url }}
    --add-host host.docker.internal:host-gateway
    -v {{ openwebui_volume }}:/app/backend/data
    {{ openwebui_image }}
  changed_when: true

- name: Wait for Open WebUI to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ openwebui_port }}/"
    method: GET
    status_code: [200]
  retries: 60
  delay: 3
  register: openwebui_health
  until: openwebui_health.status == 200
  delegate_to: "{{ inventory_hostname }}"

- name: Display Open WebUI URL
  ansible.builtin.debug:
    msg: "Open WebUI is ready at http://{{ inventory_hostname }}:{{ openwebui_port }}"
