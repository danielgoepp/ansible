---
# Standalone K3s In-Place Version Upgrade
#
# Upgrades k3s to a target version on the k3s_prod nodes WITHOUT draining or
# rebooting. The upstream installer stages the new binary and restarts the k3s
# service in place; the embedded containerd reattaches to running container
# shims, so workloads keep running across the restart (brief control-plane blip
# only). A node OS reboot is only needed for kernel updates, which this playbook
# does NOT perform - use the full cluster upgrade (ops-upgrade-cluster.yaml) when
# the Ubuntu VMs also need an apt dist-upgrade.
#
# Nodes are upgraded one at a time (serial: 1). Each node waits for cluster
# Ready before the next is touched, so the embedded-etcd control plane stays
# quorate throughout.
#
# Required:
#   -e k3s_target_version=v1.31.5+k3s1
#
# Optional:
#   -e k3s_token=<token>          # cluster token (default: k3s-prod)
#   -e stabilize_seconds=20       # settle time after restart before Ready check
#   -l k3s-prod-13                # target a single node (or comma-separated list)
#
# Usage:
#   Local:  ansible-playbook playbooks/ops-k3s-upgrade.yaml \
#             -e k3s_target_version=v1.31.5+k3s1
#   AWX:    Run as job template with k3s_target_version set as an extra var
#
# Tip: snapshot first with playbooks/ops-proxmox-snapshot-k3s.yaml

- name: K3s in-place upgrade
  hosts: k3s_prod
  serial: 1
  gather_facts: false
  vars:
    stabilize_seconds: 20

  tasks:
    - name: Validate k3s_target_version is set
      ansible.builtin.fail:
        msg: "k3s_target_version is required (e.g. -e k3s_target_version=v1.31.5+k3s1)"
      when: k3s_target_version is not defined or k3s_target_version | length == 0
      run_once: true

    - name: In-place k3s install on {{ inventory_hostname }}
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-k3s-install.yaml
      vars:
        k3s_node: "{{ inventory_hostname }}"
        k3s_skip_start: false

    - name: Allow k3s service to settle after restart
      ansible.builtin.pause:
        seconds: "{{ stabilize_seconds }}"

    - name: Wait for {{ inventory_hostname }} Ready on new version
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-health.yaml
      vars:
        health_action: node-ready
        node_name: "{{ inventory_hostname }}"

    - name: Upgrade complete on {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} upgraded to {{ k3s_target_version }} and Ready"
