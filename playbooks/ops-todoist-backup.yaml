---
# Todoist Backup Download Playbook
#
# Downloads the most recent Todoist backup using the Todoist API directly.
#
# Usage:
#   Local:  ansible-playbook playbooks/ops-todoist-backup.yaml
#   Local:  ansible-playbook playbooks/ops-todoist-backup.yaml -e todoist_backup_dir=/mnt/backups/todoist
#   AWX:    Run as job template with Todoist credentials and todoist_backup_dir configured
#
# Parameters:
#   todoist_backup_dir: str (required) - Directory to save backup files
#
# Requires:
#   - vault_todoist_oauth_token: OAuth token (run setup-oauth.py once to obtain)
#   - vault_todoist_api_token: Personal API token (Settings > Integrations > Developer)

- name: Download Todoist backup
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    todoist_base_url: "https://api.todoist.com/api/v1"

  tasks:
    - name: Set Todoist credentials from AWX or vault
      ansible.builtin.set_fact:
        todoist_oauth_token: "{{ awx_todoist_oauth_token | default(vault_todoist_oauth_token) }}"
        todoist_api_token: "{{ awx_todoist_api_token | default(vault_todoist_api_token) }}"

    - name: Get list of available backups
      ansible.builtin.uri:
        url: "{{ todoist_base_url }}/backups"
        method: GET
        headers:
          Authorization: "Bearer {{ todoist_oauth_token }}"
        return_content: true
      register: backups_response

    - name: Identify latest backup
      ansible.builtin.set_fact:
        latest_backup: "{{ backups_response.json | sort(attribute='version') | last }}"

    - name: Build destination path
      ansible.builtin.set_fact:
        backup_dest: >-
          {{ todoist_backup_dir }}/todoist-backup-{{ latest_backup.version | replace(' ', '_') | replace(':', '-') }}.zip

    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ todoist_backup_dir }}"
        state: directory
        mode: "0755"
      become: true

    - name: Download backup
      ansible.builtin.get_url:
        url: "{{ latest_backup.url }}"
        dest: "{{ backup_dest }}"
        headers:
          Authorization: "Bearer {{ todoist_api_token }}"
        force: false
        mode: "0644"
      register: download_result

    - name: Report result
      ansible.builtin.debug:
        msg: "{{ 'Saved to: ' + backup_dest if download_result.changed else 'Already exists, skipping: ' + backup_dest }}"
