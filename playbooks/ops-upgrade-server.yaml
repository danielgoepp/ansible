---
# Upgrade Ubuntu or Raspberry Pi servers
#
# Usage:
#   Local:  ansible-playbook playbooks/ops-upgrade-server.yaml -e target_host=<hostname>
#           ansible-playbook playbooks/ops-upgrade-server.yaml -e target_host=ubuntu:rpi
#   AWX:    Run as job template with target_host survey variable

- name: Upgrade server
  hosts: "{{ awx_target_host | default(target_host) }}"
  become: true

  tasks:
    - name: Run apt dist-upgrade
      ansible.builtin.include_role:
        name: common
        tasks_from: apt-dist-upgrade
