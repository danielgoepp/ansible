---
# Todoist Backup Playbook
#
# Downloads the most recent Todoist backup via the Todoist REST API v1.
# Requires a Todoist API token with the "backups:read" OAuth scope.
#
# Vault variable required:
#   vault_todoist_api_token: <your Todoist API token>
#
# Usage:
#   Local:  ansible-playbook playbooks/ops-backup-todoist.yaml
#   AWX:    Run as job template (no additional configuration required)
#
# Optional overrides:
#   -e backup_dest_dir=/path/to/backups   # Default: ~/backups/todoist
#   -e backup_retention_days=7            # Default: 7

- name: Download Todoist backup
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    todoist_api_base: "https://api.todoist.com/api/v1"
    backup_dest_dir: "{{ awx_backup_dest_dir | default('~/backups/todoist') }}"
    backup_retention_days: "{{ awx_backup_retention_days | default(7) }}"

  tasks:
    - name: Set Todoist API token from AWX or vault
      ansible.builtin.set_fact:
        todoist_api_token: "{{ awx_todoist_api_token | default(vault_todoist_api_token | default('')) }}"

    - name: Validate Todoist API token is present
      ansible.builtin.fail:
        msg: >
          Todoist API token is required but not provided.
          Ensure vault_todoist_api_token is defined in vault or awx_todoist_api_token is set in AWX credentials.
      when: todoist_api_token == ''

    - name: Ensure backup destination directory exists
      ansible.builtin.file:
        path: "{{ backup_dest_dir }}"
        state: directory
        mode: '0755'

    - name: List available Todoist backups
      ansible.builtin.uri:
        url: "{{ todoist_api_base }}/backups"
        method: GET
        headers:
          Authorization: "Bearer {{ todoist_api_token }}"
        return_content: true
        status_code: 200
      register: backups_response

    - name: Validate at least one backup is available
      ansible.builtin.fail:
        msg: "No Todoist backups found. The API returned an empty list."
      when: backups_response.json | length == 0

    - name: Set latest backup info
      ansible.builtin.set_fact:
        latest_backup: "{{ backups_response.json[0] }}"

    - name: Display backup to be downloaded
      ansible.builtin.debug:
        msg: "Downloading Todoist backup version: {{ latest_backup.version }}"

    - name: Set backup filename from version
      ansible.builtin.set_fact:
        backup_filename: "todoist_backup_{{ latest_backup.version | regex_replace('[^a-zA-Z0-9_-]', '_') }}.zip"

    - name: Download backup file
      ansible.builtin.get_url:
        url: "{{ latest_backup.url }}"
        dest: "{{ backup_dest_dir }}/{{ backup_filename }}"
        headers:
          Authorization: "Bearer {{ todoist_api_token }}"
        mode: '0640'
        force: false
      register: download_result

    - name: Display download result
      ansible.builtin.debug:
        msg: "Backup saved to: {{ download_result.dest }}"

    - name: Find backups older than retention period
      ansible.builtin.find:
        paths: "{{ backup_dest_dir }}"
        patterns: "todoist_backup_*.zip"
        age: "{{ backup_retention_days }}d"
        age_stamp: mtime
      register: old_backups

    - name: Remove old backups
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"
      when: old_backups.files | length > 0

    - name: Display cleanup result
      ansible.builtin.debug:
        msg: "Removed {{ old_backups.files | length }} backup(s) older than {{ backup_retention_days }} days"
      when: old_backups.files | length > 0
