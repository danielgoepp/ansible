---
# Cluster Maintenance Playbook
#
# Performs a rolling upgrade of:
#   - Proxmox hosts (apt dist-upgrade + reboot)
#   - Ubuntu k3s VMs (apt dist-upgrade)
#   - K3s itself (in-place version upgrade via the official installer)
#
# Pair order: pve15+k3s-prod-15 -> pve13+k3s-prod-13 -> pve12+k3s-prod-12 -> pve11+k3s-prod-11
#
# Pre-flight (once):
#   1. Validate inputs
#   2. Health gate (Ceph HEALTH_OK, no Alertmanager alerts, no down Uptime Kuma
#      monitors, opnsense on pve11)
#   3. [PAUSE] Confirm before any cluster-wide changes
#   4. Stop iotawatt-sync
#   5. Shutdown shared VMs/LXCs (ui-network, dev, smb, backup) for the entire window
#   6. Set Ceph noout flag
#   7. Set CNPG maintenance mode
#   8. Mute alerts (Graylog, Alertmanager, Uptime Kuma)
#
# Per pair:
#   See tasks/ops-upgrade-cluster-paired.yaml
#
# Post-flight:
#   1. Cluster health summary
#   2. [PAUSE] Confirm before reversing maintenance gates
#   3. Unmute alerts
#   4. Disable CNPG maintenance mode (displays kubectl get cluster -A)
#   5. Disable Ceph noout flag
#   6. Wait for Ceph HEALTH_OK
#   7. Start shared VMs/LXCs (verified running via Proxmox API)
#   8. Re-apply iotawatt-sync
#
# Required:
#   -e k3s_target_version=v1.31.5+k3s1
#
# Optional:
#   -e interactive_mode=false   # skip pause prompts
#   -e verbose_status=false     # quieter status output
#
# Usage:
#   Local:  ansible-playbook playbooks/ops-upgrade-cluster.yaml \
#             -e k3s_target_version=v1.31.5+k3s1
#   AWX:    Run as job template with k3s_target_version set as an extra var

- name: Cluster Upgrade - Pre-flight
  hosts: localhost
  gather_facts: true
  vars:
    interactive_mode: "{{ interactive_mode | default(true) }}"
    verbose_status: "{{ verbose_status | default(true) }}"
    # Hardcoded upgrade order per planning notes: 15, 13, 12, 11
    upgrade_pairs:
      - { pve: pve15, k3s: k3s-prod-15 }
      - { pve: pve13, k3s: k3s-prod-13 }
      - { pve: pve12, k3s: k3s-prod-12 }
      - { pve: pve11, k3s: k3s-prod-11 }
    # Shared VMs/LXCs that stay shut down for the entire maintenance window.
    # host_node = the PVE host that owns each VM under normal operation.
    shared_shutdowns:
      - { vm_id: 254, vm_name: ui-network, vm_type: qemu, host_node: pve15 }
      - { vm_id: 105, vm_name: dev, vm_type: qemu, host_node: pve15 }
      - { vm_id: 103, vm_name: backup, vm_type: qemu, host_node: pve15 }
      - { vm_id: 106, vm_name: smb, vm_type: lxc, host_node: pve15 }
    opnsense_vm_id: 101
    opnsense_home_node: pve11
    opnsense_failover_node: pve12

  tasks:
    - name: Validate k3s_target_version
      ansible.builtin.fail:
        msg: |
          k3s_target_version is required.
          Example: -e k3s_target_version=v1.31.5+k3s1
      when: k3s_target_version is not defined or k3s_target_version | length == 0

    # Persist play vars as facts so they survive across plays (play vars are
    # scoped to a single play; facts persist on the host for the run).
    - name: Persist cross-play configuration as facts
      ansible.builtin.set_fact:
        interactive_mode: "{{ interactive_mode }}"
        verbose_status: "{{ verbose_status }}"
        upgrade_pairs: "{{ upgrade_pairs }}"
        shared_shutdowns: "{{ shared_shutdowns }}"
        opnsense_vm_id: "{{ opnsense_vm_id }}"
        opnsense_home_node: "{{ opnsense_home_node }}"
        opnsense_failover_node: "{{ opnsense_failover_node }}"

    - name: Display upgrade plan
      ansible.builtin.debug:
        msg: |
          ===================================================
          CLUSTER MAINTENANCE PLAYBOOK
          ===================================================
          k3s target version : {{ k3s_target_version }}
          Interactive mode   : {{ interactive_mode }}
          Verbose status     : {{ verbose_status }}

          Upgrade pair order :
          {% for p in upgrade_pairs %}
            {{ loop.index }}. {{ p.pve }} + {{ p.k3s }}
          {% endfor %}

          Shared VMs to shut down for the window:
          {% for v in shared_shutdowns %}
            - {{ v.vm_name }} ({{ v.vm_type }} {{ v.vm_id }}) on {{ v.host_node }}
          {% endfor %}

          opnsense (VM {{ opnsense_vm_id }}) will move {{ opnsense_home_node }} -> {{ opnsense_failover_node }}
          before the {{ opnsense_home_node }} pair, then back after.

    - name: Confirm cluster upgrade
      ansible.builtin.pause:
        prompt: |

          About to start cluster maintenance. Estimated 60+ minutes.
          Continue? (yes/no)
      register: top_confirm
      when: interactive_mode | bool

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Cluster upgrade cancelled by user"
      when:
        - interactive_mode | bool
        - top_confirm.user_input | lower not in ['yes', 'y']

    # PRE-FLIGHT: health gate
    - name: Pre-flight health gate
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-preflight.yaml

    - name: Confirm pre-flight passed — proceed with maintenance setup
      ansible.builtin.pause:
        prompt: |

          Pre-flight passed. About to make cluster-wide changes:
            - Shutdown shared VMs (ui-network, dev, smb, backup)
            - Set Ceph noout flag
            - Enable CNPG maintenance mode
            - Mute alerts (Graylog, Alertmanager, Uptime Kuma)
          Proceed? (yes/no)
      register: preflight_proceed_confirm
      when: interactive_mode | bool

    - name: Abort if pre-flight proceed not confirmed
      ansible.builtin.fail:
        msg: "Cluster upgrade cancelled before maintenance setup"
      when:
        - interactive_mode | bool
        - preflight_proceed_confirm.user_input | lower not in ['yes', 'y']

    # PRE-FLIGHT: stop iotawatt-sync
    - name: Stop iotawatt-sync
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-iotawatt.yaml
      vars:
        iotawatt_action: stop

    # PRE-FLIGHT: shutdown shared VMs (entire window)
    - name: Shutdown shared VMs/LXCs for the maintenance window
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-vm.yaml
      vars:
        vm_action: shutdown
        vm_shutdowns: "{{ shared_shutdowns }}"

    # PRE-FLIGHT: enable Ceph noout
    - name: Enable Ceph noout flag
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-ceph-noout.yaml
      vars:
        maintenance_action: enable

    # PRE-FLIGHT: enable CNPG maintenance
    - name: Enable CNPG maintenance mode
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-cnpg-maintenance.yaml
      vars:
        maintenance_action: enable

    # PRE-FLIGHT: mute alerts
    - name: Mute alerts (Graylog / Alertmanager / Uptime Kuma)
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-alerts.yaml
      vars:
        maintenance_action: enable

    - name: Pre-flight complete
      ansible.builtin.debug:
        msg: "=== Pre-flight done. Beginning paired upgrades. ==="

# PAIRED LOOP
- name: Cluster Upgrade - Paired Upgrades
  hosts: localhost
  gather_facts: false
  vars:
    upgrade_pairs: "{{ hostvars['localhost']['upgrade_pairs'] }}"
    opnsense_vm_id: "{{ hostvars['localhost']['opnsense_vm_id'] }}"
    opnsense_home_node: "{{ hostvars['localhost']['opnsense_home_node'] }}"
    opnsense_failover_node: "{{ hostvars['localhost']['opnsense_failover_node'] }}"

  tasks:
    - name: Upgrade each pair
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-paired.yaml
      vars:
        pve_node: "{{ pair.pve }}"
        k3s_node: "{{ pair.k3s }}"
      loop: "{{ upgrade_pairs }}"
      loop_control:
        loop_var: pair
        label: "{{ pair.pve }} + {{ pair.k3s }}"

# POST-FLIGHT
- name: Cluster Upgrade - Post-flight
  hosts: localhost
  gather_facts: false
  vars:
    shared_shutdowns: "{{ hostvars['localhost']['shared_shutdowns'] }}"
    interactive_mode: "{{ hostvars['localhost']['interactive_mode'] | default(true) }}"

  tasks:
    - name: Cluster health summary
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-health.yaml
      vars:
        health_action: cluster-status

    - name: Confirm post-flight cleanup
      ansible.builtin.pause:
        prompt: |

          ===================================================
          ALL PAIRS COMPLETE — REVIEW CLUSTER STATUS ABOVE
          ===================================================
          About to begin post-flight cleanup:
            - Unmute alerts (Graylog, Alertmanager, Uptime Kuma)
            - Disable CNPG maintenance mode
            - Disable Ceph noout flag (rebalancing will resume)
            - Start shared VMs (ui-network, dev, smb, backup)
            - Re-apply iotawatt-sync
          Proceed? (yes/no)
      register: postflight_confirm
      when: interactive_mode | bool

    - name: Abort if post-flight not confirmed
      ansible.builtin.fail:
        msg: "Post-flight cancelled by operator"
      when:
        - interactive_mode | bool
        - postflight_confirm.user_input | lower not in ['yes', 'y']

    - name: Unmute alerts
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-alerts.yaml
      vars:
        maintenance_action: disable

    - name: Disable CNPG maintenance mode
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-cnpg-maintenance.yaml
      vars:
        maintenance_action: disable

    - name: Disable Ceph noout flag
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-ceph-noout.yaml
      vars:
        maintenance_action: disable

    - name: Wait for Ceph HEALTH_OK after noout unset
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-ceph-health.yaml
      vars:
        allow_noout: false
        ceph_health_retries: 60
        ceph_health_delay: 30

    - name: Start shared VMs/LXCs
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-vm.yaml
      vars:
        vm_action: startup
        vm_shutdowns: "{{ shared_shutdowns }}"

    - name: Re-apply iotawatt-sync
      ansible.builtin.include_tasks: ../tasks/ops-upgrade-cluster-iotawatt.yaml
      vars:
        iotawatt_action: start

    - name: Cluster maintenance complete
      ansible.builtin.debug:
        msg: |
          ===================================================
          CLUSTER MAINTENANCE COMPLETE
          ===================================================
          k3s target version : {{ k3s_target_version }}

          Manual checks (per planning notes):
          - Verify Postgres pods are accepting connections
          - Verify Mosquitto pod is up, no errors in logs
          - Verify zigbee15 and zigbee11 pods are up
          - Verify Home Assistant is up and reachable
