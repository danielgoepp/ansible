---
# Calico CNI Upgrade Playbook
# This playbook uses the unified update framework
# Configuration: inventories/group_vars/all/k3s_applications.yml
#
# Required:
#   -e calico_target_version=v3.32.0
#
# Usage:
#   ansible-playbook playbooks/k3s/update-calico.yaml -e calico_target_version=v3.32.0
#
# Note: This is a wrapper that calls the unified update-app.yaml playbook

- name: Update Calico CNI using unified framework
  import_playbook: update-app.yaml
  vars:
    app_name: calico
